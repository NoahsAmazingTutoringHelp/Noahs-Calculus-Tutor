        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }

        #status-text { margin-top: 20px; font-size: 18px; font-weight: bold; text-transform: uppercase; }

        #progress-container {
            width: 300px;
            height: 10px;
            background: #444;
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: #ffffff;
            transition: width 0.1s linear;
        }

  <body>

    <div id="loader-wrapper">
        <div id="spinning-logo"></div>
        <div id="status-text">Connecting to CDN...</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="note">we ALL loves noahs tutoring hub</div>
    </div>

    <div id="unity-container" hidden>
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script>
        const loaderWrapper = document.querySelector("#loader-wrapper");
        const progressBar = document.querySelector("#progress-bar");
        const statusText = document.querySelector("#status-text");
        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");

        let loadedBytes = 0;
        const totalExpectedBytes = 126.2 * 1024 * 1024;

        function updateUI(percentage, text) {
            progressBar.style.width = percentage + "%";
            statusText.textContent = text;
        }

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`CDN blocked ${url.split('/').pop()}`);
            
            const reader = response.body.getReader();
            let chunks = [];
            let received = 0;

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                
                received += value.length;
                loadedBytes += value.length;
                
                let overallProgress = Math.min((loadedBytes / totalExpectedBytes) * 100, 100);
                updateUI(overallProgress, `Downloading: ${Math.round(overallProgress)}%`);
                
                chunks.push(value);
            }

            let fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (let chunk of chunks) {
                fullBuffer.set(chunk, offset);
                offset += chunk.length;
            }
            return fullBuffer.buffer;
        }

        (async () => {
            const cdnBase = "https://cdn.jsdelivr.net/gh/mysticful/web-port@latest/whosyourdaddy/Build/";
            const dataParts = Array.from({length: 6}, (_, i) => `${cdnBase}daddyreeyuki.data.part${i + 1}`);
            const wasmParts = Array.from({length: 3}, (_, i) => `${cdnBase}daddyreeyuki.wasm.part${i + 1}`);

            try {
                const dataBuffers = await Promise.all(dataParts.map(url => fetchWithProgress(url)));
                const wasmBuffers = await Promise.all(wasmParts.map(url => fetchWithProgress(url)));

                updateUI(100, "Assembling files...");

                const dataUrl = URL.createObjectURL(new Blob(dataBuffers));
                const wasmUrl = URL.createObjectURL(new Blob(wasmBuffers));

                const config = {
                    dataUrl: dataUrl,
                    frameworkUrl: `${cdnBase}daddyreeyuki.framework.js`,
                    codeUrl: wasmUrl,
                    streamingAssetsUrl: "StreamingAssets",
                    companyName: "Evil Tortilla Games",
                    productName: "Who's Your Daddy",
                    productVersion: "1.0",
                };

                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                const loaderScript = document.createElement("script");
                loaderScript.src = `${cdnBase}daddyreeyuki.loader.js`;
                loaderScript.onload = () => {
                    createUnityInstance(canvas, config, (progress) => {
                        updateUI(100, `Starting Engine: ${Math.round(progress * 100)}%`);
                    }).then(() => {
                        loaderWrapper.remove();
                        container.hidden = false;
                    });
                };
                document.body.appendChild(loaderScript);

            } catch (err) {
                statusText.style.color = "red";
                statusText.textContent = "Error: " + err.message;
                console.error(err);
            }
        })();
    </script>
  </body>
