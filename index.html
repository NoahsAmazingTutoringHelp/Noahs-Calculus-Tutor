<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noah's Tutoring | Outdated Link</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Courier New', monospace;
    }

    :root {
      --primary-orange: #c27c15;
      --primary-orange-rgb: 194, 124, 21;
      --dark-bg: #0a0a0a;
      --light-text: #f6f4ef;
      --gray-text: #b5b0a6;
    }

    body {
      background-color: var(--dark-bg);
      color: var(--light-text);
      overflow: hidden;
      line-height: 1.55;
    }

    #background-root {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(circle at center, #0b1218 0%, #05070b 65%, #040507 100%);
    }

    #matrix-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #background-glow {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(circle at 50% 45%, rgba(var(--primary-orange-rgb), 0.18) 0%, rgba(var(--primary-orange-rgb), 0.08) 35%, transparent 70%);
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .notice-card {
      position: relative;
      background: linear-gradient(145deg, rgba(24, 24, 24, 0.85), rgba(11, 11, 11, 0.9));
      border: 1px solid rgba(var(--primary-orange-rgb), 0.5);
      border-radius: 18px;
      padding: 40px;
      max-width: 600px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 25px rgba(var(--primary-orange-rgb), 0.2);
      animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .notice-card::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 20px;
      background: linear-gradient(45deg, rgba(var(--primary-orange-rgb), 0.8), transparent, rgba(var(--primary-orange-rgb), 0.8));
      z-index: -1;
      opacity: 0.3;
      animation: borderPulse 4s ease-in-out infinite;
    }

    @keyframes popIn {
      0% { transform: scale(0.9) translateY(30px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes borderPulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.01); filter: blur(4px); }
    }

    .logo {
      height: 90px;
      border-radius: 12px;
      margin-bottom: 24px;
      animation: floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { 
        transform: translateY(0); 
        filter: drop-shadow(0 0 12px rgba(var(--primary-orange-rgb), 0.5)); 
      }
      50% { 
        transform: translateY(-8px); 
        filter: drop-shadow(0 0 25px rgba(var(--primary-orange-rgb), 0.9)); 
      }
    }

    h1 {
      color: var(--primary-orange);
      font-size: 1.8rem;
      margin-bottom: 16px;
      text-shadow: 0 0 15px rgba(var(--primary-orange-rgb), 0.6), 0 0 30px rgba(var(--primary-orange-rgb), 0.3);
      letter-spacing: 0.5px;
    }

    p {
      color: var(--gray-text);
      font-size: 1rem;
      margin-bottom: 35px;
      line-height: 1.6;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    .button-container {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: bold;
      text-transform: uppercase;
      text-decoration: none;
      letter-spacing: 0.8px;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .btn-discord {
      background: rgba(88, 101, 242, 0.15);
      color: #5865F2;
      border: 1px solid #5865F2;
    }

    .btn-discord:hover {
      background: rgba(88, 101, 242, 0.3);
      box-shadow: 0 0 20px rgba(88, 101, 242, 0.5);
      transform: translateY(-3px) scale(1.02);
      color: #fff;
    }

    .btn-alt {
      background: rgba(var(--primary-orange-rgb), 0.15);
      color: var(--primary-orange);
      border: 1px solid var(--primary-orange);
    }

    .btn-alt:hover {
      background: rgba(var(--primary-orange-rgb), 0.3);
      box-shadow: 0 0 20px rgba(var(--primary-orange-rgb), 0.6), inset 0 0 10px rgba(var(--primary-orange-rgb), 0.2);
      transform: translateY(-3px) scale(1.02);
      color: #fff;
      border-color: #f2ab34;
    }

  </style>
</head>
<body>

  <div id="background-root">
    <canvas id="matrix-bg"></canvas>
    <div id="background-glow"></div>
  </div>

  <div class="content-wrapper">
    <div class="notice-card">
      <img src="https://cdn.jsdelivr.net/gh/NoahsAmazingTutoringHelp/Noahs-Calculus-Tutor/images/logo.png" alt="Noah's Tutoring Hub" class="logo">
      
      <h1>This link is now outdated :(</h1>
      
      <p>Noah's Tutoring Has Upgraded to a Server Allowing for COOLER things, join the discord for ALL new links completely unblocked. Or press the button below for a link that MAY be unblocked</p>
      
      <div class="button-container">
        <a href="https://discord.gg/pCGQ8vrKza" target="_blank" class="btn btn-discord">
          <i class="fab fa-discord"></i> Join Discord
        </a>
        <button id="get-links-btn" class="btn btn-alt">
          <i class="fas fa-link"></i> Click me for new links
        </button>
      </div>
    </div>
  </div>

  <script>
    // --- LINK LOADING LOGIC ---
    const getLinksBtn = document.getElementById('get-links-btn');
    const sourceUrl = "https://raw.githubusercontent.com/NoahsAmazingTutoringHelp/totallynotthelinks/refs/heads/main/index.html";

    getLinksBtn.addEventListener('click', async () => {
      try {
        // Fetch the raw HTML content
        const response = await fetch(sourceUrl);
        if (!response.ok) throw new Error('Failed to fetch the file.');
        const htmlCode = await response.text();

        // Create the about:blank window
        const win = window.open('about:blank', '_blank');
        
        if (win) {
          // Write the code into the new window
          win.document.open();
          win.document.write(htmlCode);
          win.document.close();
        } else {
          alert('Pop-up blocked! Please allow pop-ups to see the new links.');
        }
      } catch (error) {
        console.error('Error loading links:', error);
        alert('Could not load the new links. Check your connection or the Discord.');
      }
    });

    // --- ORIGINAL MATRIX ANIMATION ---
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    
    const bgState = {
      drops: [],
      columns: 0,
      fontSize: 14,
      lastRenderAt: 0,
      color: { r: 194, g: 124, b: 21 }
    };

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      
      initDrops();
    }

    function initDrops() {
      bgState.columns = Math.max(1, Math.floor(window.innerWidth / bgState.fontSize));
      bgState.drops = Array.from({ length: bgState.columns }, () => 
        Math.floor((Math.random() * window.innerHeight) / bgState.fontSize)
      );
    }

    function renderMatrix() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const { r, g, b } = bgState.color;

      const trailR = Math.max(2, Math.round(r * 0.1));
      const trailG = Math.max(2, Math.round(g * 0.1));
      const trailB = Math.max(2, Math.round(b * 0.1));
      
      ctx.fillStyle = `rgba(${trailR}, ${trailG}, ${trailB}, 0.1)`;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = `rgb(${Math.min(255, r + 14)}, ${Math.min(255, g + 14)}, ${Math.min(255, b + 14)})`;
      ctx.font = `${bgState.fontSize}px monospace`;

      const chars = ['0', '1'];
      const advance = 1.06;

      for (let i = 0; i < bgState.drops.length; i++) {
        const text = chars[(Math.random() * chars.length) | 0];
        const y = bgState.drops[i] * bgState.fontSize;
        
        ctx.fillText(text, i * bgState.fontSize, y);

        if (y > height && Math.random() > 0.972) {
          bgState.drops[i] = 0;
        } else {
          bgState.drops[i] += advance;
        }
      }
    }

    function loopBackground(now) {
      if (now - bgState.lastRenderAt < 1000 / 55) {
        requestAnimationFrame(loopBackground);
        return;
      }
      bgState.lastRenderAt = now;
      
      renderMatrix();
      requestAnimationFrame(loopBackground);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    requestAnimationFrame(loopBackground);
  </script>
</body>
</html>
